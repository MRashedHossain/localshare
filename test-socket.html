<!DOCTYPE html>
<html>
<head>
  <title>LocalShare</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }

    /* Setup Screen Styles */
    #setupScreen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 80vh;
    }
    #setupScreen h1 { font-size: 2rem; margin-bottom: 10px; }
    #setupScreen p { color: #666; margin-bottom: 20px; }
    #setupScreen input {
      padding: 12px;
      font-size: 1rem;
      width: 300px;
      border: 2px solid #007bff;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    #setupScreen button {
      padding: 12px 32px;
      font-size: 1rem;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      width: 324px;
    }
    #setupScreen button:hover { background: #0056b3; }

    /* Main App Styles */
    #mainApp { display: none; }
    #log { background: #f0f0f0; padding: 10px; height: 200px; overflow-y: auto; margin: 10px 0; }
    button { margin: 5px; padding: 8px 16px; cursor: pointer; }
    input { margin: 5px; padding: 8px; }
    #progress { width: 100%; background: #ddd; border-radius: 4px; display: none; }
    #progressBar { width: 0%; height: 20px; background: #4CAF50; border-radius: 4px; text-align: center; color: white; }
    .device-btn { background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; padding: 8px 16px; margin: 4px; }
    .device-btn:hover { background: #0056b3; }
    .device-btn.selected { background: #28a745; }
    #selectedReceiver { color: green; font-weight: bold; margin: 5px 0; }
    #myDeviceName { color: #007bff; font-weight: bold; }
  </style>
</head>
<body>

  <!-- ===== SCREEN 1: Setup ===== -->
  <div id="setupScreen">
    <h1>📡 LocalShare</h1>
    <p>What should others call you?</p>
    <input
      id="deviceNameInput"
      placeholder="e.g. Rashed's Laptop"
      onkeydown="if(event.key === 'Enter') submitName()"
    />
    <button onclick="submitName()">Join LocalShare →</button>
  </div>

  <!-- ===== SCREEN 2: Main App ===== -->
  <div id="mainApp">
    <h1>📡 LocalShare</h1>
    <div id="status">Connecting...</div>
    <p>👤 You are: <span id="myDeviceName">...</span></p>
    <div id="log"></div>

    <hr/>
    <h3>Room</h3>
    <button onclick="createRoom()">Create Room</button>
    <input id="roomCode" placeholder="Enter room code" />
    <button onclick="joinRoom()">Join Room</button>

    <hr/>
    <h3>Devices in Room</h3>
    <button onclick="refreshDevices()">🔄 Refresh Devices</button>
    <div id="deviceList"><p>Join a room to see devices</p></div>
    <div id="selectedReceiver"></div>

    <hr/>
    <h3>Send File</h3>
    <input type="file" id="fileInput" />
    <button onclick="sendFile()">Send File</button>

    <hr/>
    <h3>Progress</h3>
    <div id="progress">
      <div id="progressBar">0%</div>
    </div>
    <div id="downloadArea"></div>
  </div>

  <script src="http://localhost:3000/socket.io/socket.io.js"></script>
  <script>
    const log = document.getElementById('log');
    const status = document.getElementById('status');
    const CHUNK_SIZE = 64 * 1024;

    const socket = io('http://localhost:3000');
    let currentRoom = null;
    let myDeviceId = null;
    let myDeviceName = null;
    let selectedReceiverId = null;

    function addLog(msg) {
      console.log(msg);
      log.innerHTML += `<p>${msg}</p>`;
      log.scrollTop = log.scrollHeight;
    }

    // --- Setup Screen ---
    function submitName() {
      const name = document.getElementById('deviceNameInput').value.trim();

      if (!name) {
        alert('Please enter your name!');
        return;
      }

      // Save name locally
      myDeviceName = name;

      // Tell server our chosen name
      socket.emit('rename-device', { newName: name });

      // Hide setup screen
      document.getElementById('setupScreen').style.display = 'none';

      // Show main app
      document.getElementById('mainApp').style.display = 'block';

      // Show name in main app
      document.getElementById('myDeviceName').textContent = name;

      addLog(`👤 Your name set to: ${name}`);
    }

    // --- Connection Events ---
    socket.on('connect', () => {
      console.log(`🔌 Connected! ID: ${socket.id}`);
    });

    socket.on('welcome', (data) => {
      status.textContent = '✅ Connected!';
      myDeviceId = data.yourDevice.id;
    });

    socket.on('device-list', (data) => {
      addLog(`📊 Total devices: ${data.devices.length}`);
    });

    socket.on('device-joined', (data) => {
      addLog(`➕ ${data.device.name} joined!`);
    });

    socket.on('device-left', (data) => {
      addLog(`➖ ${data.deviceName} left!`);
      if (data.deviceId === selectedReceiverId) {
        selectedReceiverId = null;
        document.getElementById('selectedReceiver').textContent = '';
        addLog(`⚠️ Your selected receiver disconnected!`);
      }
    });

    socket.on('device-renamed', (data) => {
      addLog(`✏️ ${data.device.name} is now in the session`);
    });

    // --- Room Events ---
    function createRoom() {
      socket.emit('create-room');
    }

    function joinRoom() {
      const code = document.getElementById('roomCode').value;
      socket.emit('join-room', { code });
    }

    function refreshDevices() {
      if (!currentRoom) {
        addLog('❌ Join a room first!');
        return;
      }
      socket.emit('get-room-devices', { roomCode: currentRoom });
    }

    socket.on('room-created', (data) => {
      currentRoom = data.room.code;
      addLog(`🏠 Room created! Code: <strong>${data.room.code}</strong>`);
      socket.emit('get-room-devices', { roomCode: data.room.code });
    });

    socket.on('room-joined', (data) => {
      currentRoom = data.room.code;
      addLog(`✅ Joined room: <strong>${data.room.code}</strong>`);
      socket.emit('get-room-devices', { roomCode: data.room.code });
    });

    socket.on('room-error', (data) => {
      addLog(`❌ Room error: ${data.message}`);
    });

    socket.on('device-joined-room', (data) => {
      addLog(`➕ ${data.device.name} joined the room!`);
      if (currentRoom) socket.emit('get-room-devices', { roomCode: currentRoom });
    });

    socket.on('device-left-room', (data) => {
      addLog(`➖ ${data.device.name} left the room!`);
      if (currentRoom) socket.emit('get-room-devices', { roomCode: currentRoom });
    });

    socket.on('room-devices', (data) => {
      const deviceList = document.getElementById('deviceList');
      deviceList.innerHTML = '';

      // Filter out yourself from the list
      const otherDevices = data.devices.filter(d => d.id !== myDeviceId);

      if (otherDevices.length === 0) {
        deviceList.innerHTML = '<p>No other devices in room yet</p>';
        return;
      }

      otherDevices.forEach((device) => {
        const btn = document.createElement('button');
        btn.className = 'device-btn';
        btn.textContent = `📱 ${device.name}`;
        btn.dataset.deviceId = device.id;

        btn.onclick = () => {
          document.querySelectorAll('.device-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          selectedReceiverId = device.id;
          document.getElementById('selectedReceiver').textContent =
            `✅ Sending to: ${device.name}`;
          addLog(`🎯 Selected: ${device.name}`);
        };

        deviceList.appendChild(btn);
      });
    });

    // --- File Sending ---
    async function sendFile() {
      if (!selectedReceiverId) {
        addLog('❌ Please select a device to send to!');
        return;
      }

      const fileInput = document.getElementById('fileInput');
      const file = fileInput.files[0];
      if (!file) { addLog('❌ Please select a file!'); return; }

      const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
      addLog(`📤 Sending: ${file.name} | ${totalChunks} chunks`);

      socket.emit('transfer-request', {
        receiverId: selectedReceiverId,
        fileName: file.name,
        fileSize: file.size,
        fileType: file.type,
        totalChunks,
      });

      socket.once('transfer-accepted', async (data) => {
        addLog(`✅ Accepted! Starting transfer...`);
        document.getElementById('progress').style.display = 'block';

        for (let i = 0; i < totalChunks; i++) {
          const start = i * CHUNK_SIZE;
          const end = Math.min(start + CHUNK_SIZE, file.size);
          const chunkBlob = file.slice(start, end);
          const chunkBuffer = await chunkBlob.arrayBuffer();

          socket.emit('transfer-chunk', {
            transferId: data.transferId,
            chunkIndex: i,
            chunk: chunkBuffer,
            receiverId: selectedReceiverId,
          });

          const pct = Math.round(((i + 1) / totalChunks) * 100);
          document.getElementById('progressBar').style.width = pct + '%';
          document.getElementById('progressBar').textContent = pct + '%';
        }

        addLog(`📦 All chunks sent!`);
      });
    }

    // --- File Receiving ---
    socket.on('transfer-incoming', (data) => {
      const { metadata } = data;
       addLog(`📥 Incoming: ${metadata.fileName} from ${metadata.senderName}`);

      const accepted = confirm(`📥 ${metadata.senderName} wants to send you:\n\n"${metadata.fileName}"\nSize: ${(metadata.fileSize / 1024).toFixed(1)} KB\n\nAccept?`);

      if (accepted) {
        socket.emit('transfer-accept', { transferId: metadata.transferId, metadata });
        addLog(`✅ Accepted!`);
      } else {
        socket.emit('transfer-reject', { transferId: metadata.transferId, senderId: metadata.senderId });
        addLog(`❌ Rejected!`);
      }
    });

    socket.on('transfer-progress', (data) => {
      addLog(`📦 Progress: ${data.percentage}%`);
    });

    socket.on('transfer-complete', (data) => {
      addLog(`🎉 File received: ${data.fileName}!`);

      const byteCharacters = atob(data.fileData);
      const byteNumbers = new Array(byteCharacters.length);
      for (let i = 0; i < byteCharacters.length; i++) {
        byteNumbers[i] = byteCharacters.charCodeAt(i);
      }
      const byteArray = new Uint8Array(byteNumbers);
      const blob = new Blob([byteArray], { type: data.fileType });

      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = data.fileName;
      a.textContent = `⬇️ Download ${data.fileName}`;
      a.style.display = 'block';
      a.style.marginTop = '10px';
      document.getElementById('downloadArea').appendChild(a);
    });

    socket.on('transfer-done', () => {
      addLog(`✅ Transfer complete!`);
    });

    socket.on('transfer-rejected', () => {
      addLog(`❌ Receiver rejected the transfer!`);
    });

    socket.on('transfer-cancelled', (data) => {
      addLog(`❌ Transfer cancelled: ${data.reason}`);
    });

    socket.on('transfer-error', (data) => {
      addLog(`❌ Error: ${data.message}`);
    });
  </script>
</body>
</html>
